apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: three-tier-app
data:
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_NAME: "appdb"
  DB_USER: "appuser"
---
# NOTE: In production, do NOT store secrets like this in plain YAML/base64.
# Use AWS Secrets Manager + External Secrets Operator, or ASCP, to sync this instead.
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: three-tier-app
type: Opaque
stringData:
  DB_PASSWORD: "changeme-use-secrets-manager"
